#
# THE SEVEN CHAINS:
#   CPU     - The Mind          (Proof of Work)
#   GPU     - The Parallel      (Proof of Compute)
#   MEMORY  - The Living        (Proof of Memory)
#   STORAGE - The Persistent    (Proof of Storage)
#   NETWORK - The Connected     (Proof of Bandwidth)
#   INPUT   - The Inward        (Proof of Input)
#   OUTPUT  - The Multiplier    (Proof of Output)
# ═══════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Chain 1: CPU - The Mind
  # ─────────────────────────────────────────────────────────────────────────
  chain-cpu:
    build:
      context: ../..
      dockerfile: GH0ST_B0Y/docker/Dockerfile
    container_name: genesis-chain-cpu
    environment:
      - CHAIN_TYPE=cpu
      - GENESIS_HOME=/data
    volumes:
      - genesis-data:/data
    restart: unless-stopped
    labels:
      - "genesis.chain=cpu"
      - "genesis.symbol=The Mind"
      - "genesis.proof=proof_of_work"

  # ─────────────────────────────────────────────────────────────────────────
  # Chain 2: GPU - The Parallel
